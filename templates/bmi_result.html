<!DOCTYPE html>
<html>
<head>

<title>BMI Result</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

{% include 'navbar.html' %}

<div class="container">

<div class="card">

<h1>Hello {{ name }}</h1>

<h2>Your BMI : {{ bmi }}</h2>

<h2>Status : {{ status }}</h2>

<form action="/body_type" method="POST">

<select name="goal" required>

<option value="">
Select Goal
</option>

<option value="Weight Gain">
Weight Gain
</option>

<option value="Weight Loss">
Weight Loss
</option>

</select>

<button type="submit">
Continue
</button>

</form>

</div>

</div>
<a href="/bmi">
    <button>
        ← Back
    </button>
</a>
</body>
</html>
